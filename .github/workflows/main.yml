
name: CLT Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Clean and Build
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon
